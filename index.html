<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vtk-easy examples</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #picker {
      position: fixed; top: 10px; left: 10px; z-index: 1000;
      background: rgba(0,0,0,0.7); color: #fff; padding: 8px 12px;
      border-radius: 6px; font-size: 14px;
    }
    #picker select { font-size: 14px; margin-left: 6px; }
  </style>
</head>
<body>
  <div id="picker">
    <label>Example:
      <select id="example-select">
        <option value="ConeSource">ConeSource</option>
        <option value="SphereSource">SphereSource</option>
        <option value="OutlineFilter">OutlineFilter</option>
        <option value="TubeFilter">TubeFilter</option>
        <option value="ImageMapper">ImageMapper</option>
        <option value="Glyph3DMapper">Glyph3DMapper</option>
        <option value="Calculator">Calculator</option>
        <option value="DefineFilter">DefineFilter</option>
      </select>
    </label>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
